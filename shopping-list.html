<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Lists</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAF8F5;
    --panel: #FFFFFF;
    --line: #ECE7DF;
    --ink: #2E2B27;
    --ink-mid: #8B857C;
    --accent: #7FCFC1;
    --accent-todo: #F6C77C;
  }
  body.tab-todo{ --accent: var(--accent-todo); }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{
    width:100%; min-height:100%;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap{
    max-width:520px;
    margin:0 auto;
    padding:20px 16px 100px;
  }
  h1{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:24px;
    margin-bottom:4px;
  }
  .subtitle{
    font-size:13px;
    color:var(--ink-mid);
    margin-bottom:18px;
  }
  .tab-row{
    display:flex;
    gap:6px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:4px;
    margin-bottom:16px;
  }
  .tab-btn{
    flex:1;
    border:none;
    background:transparent;
    color:var(--ink-mid);
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:14px;
    padding:10px 0;
    border-radius:9px;
    cursor:pointer;
  }
  .tab-btn.active{
    background:var(--ink);
    color:#fff;
  }

  .add-row{
    display:flex;
    gap:8px;
    margin-bottom:18px;
    position:sticky;
    top:0;
    background:var(--bg);
    padding:6px 0 10px;
    z-index:5;
  }
  .add-row input{
    flex:1;
    padding:13px 16px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--panel);
    font-family:'Inter', sans-serif;
    font-size:16px;
    color:var(--ink);
  }
  .add-row input:focus{ outline:2px solid var(--accent); outline-offset:1px; }
  .add-row button{
    padding:0 20px;
    border-radius:12px;
    border:none;
    background:var(--ink);
    color:#fff;
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
  }
  .add-row button:active{ opacity:0.85; }

  .list-item{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:15px 16px;
    margin-bottom:9px;
  }
  .list-item.done{ background:#FAF9F7; }

  .checkbox{
    width:28px; height:28px;
    border-radius:50%;
    border:2px solid var(--ink-mid);
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    color:#fff;
    font-size:15px;
    font-weight:700;
  }
  .checkbox.checked{ background:var(--accent); border-color:var(--accent); }

  .item-text{ flex:1; font-size:16px; word-break:break-word; }
  .list-item.done .item-text{ text-decoration:line-through; color:var(--ink-mid); }

  .delete-btn{
    color:var(--ink-mid);
    font-size:20px;
    padding:4px 6px;
    flex-shrink:0;
  }

  .empty-state{
    text-align:center;
    color:var(--ink-mid);
    font-size:14px;
    padding:50px 0;
  }

  .status-row{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-mid);
    margin-top:18px;
  }
</style>
</head>
<body>

<div class="wrap">
  <h1 id="pageTitle">🛒 Shopping List</h1>
  <div class="subtitle">Shared with the family — changes sync automatically</div>

  <div class="tab-row">
    <button class="tab-btn" id="tabShopping">🛒 Shopping</button>
    <button class="tab-btn" id="tabTodo">✅ To-do</button>
  </div>

  <div class="add-row">
    <input type="text" id="itemInput" placeholder="Add an item…" autocomplete="off">
    <button id="addBtn">Add</button>
  </div>

  <div id="items"></div>

  <div class="status-row" id="statusRow">—</div>
</div>

<script>
// Point this at your Worker's URL (same one the dashboard uses).
const WORKER_URL = 'https://family-calendar.jonathanspencedesign.workers.dev/';

// Each tab is just a { endpoint, cacheKey, items, placeholder, title, emptyText }
// bundle — same shape and same sync logic, pointed at a different Worker path
// and localStorage key so the two lists never mix.
const TABS = {
  shopping: {
    endpoint: new URL('/list', WORKER_URL).toString(),
    cacheKey: 'family-shopping-list-v1', // same key the tablet dashboard uses, for a consistent local fallback
    title: '🛒 Shopping List',
    placeholder: 'Add an item…',
    emptyText: 'List\'s empty — add something above.',
    items: [],
  },
  todo: {
    endpoint: new URL('/todos', WORKER_URL).toString(),
    cacheKey: 'family-todo-v1', // same key the tablet dashboard uses
    title: '✅ To-do List',
    placeholder: 'Add a to-do…',
    emptyText: 'Nothing to do — add something above.',
    items: [],
  },
};

const TAB_STORAGE_KEY = 'family-lists-active-tab-v1';
let activeTab = (localStorage.getItem(TAB_STORAGE_KEY) === 'todo') ? 'todo' : 'shopping';

Object.entries(TABS).forEach(([key, tab]) => { tab.items = loadCache(tab.cacheKey); });

function loadCache(cacheKey){
  try{
    const raw = localStorage.getItem(cacheKey);
    return raw ? JSON.parse(raw) : [];
  } catch(e){ return []; }
}

function saveCache(tab){
  try{ localStorage.setItem(tab.cacheKey, JSON.stringify(tab.items)); } catch(e){}
}

function currentTab(){ return TABS[activeTab]; }

function renderTabs(){
  document.getElementById('tabShopping').classList.toggle('active', activeTab === 'shopping');
  document.getElementById('tabTodo').classList.toggle('active', activeTab === 'todo');
  document.body.classList.toggle('tab-todo', activeTab === 'todo');
  document.getElementById('pageTitle').textContent = currentTab().title;
  document.getElementById('itemInput').placeholder = currentTab().placeholder;
}

function switchTab(tab){
  if(activeTab === tab) return;
  activeTab = tab;
  try{ localStorage.setItem(TAB_STORAGE_KEY, activeTab); } catch(e){}
  renderTabs();
  render();
  fetchList();
}

function render(){
  const tab = currentTab();
  const container = document.getElementById('items');
  container.innerHTML = '';

  if(tab.items.length === 0){
    container.innerHTML = '<div class="empty-state">' + tab.emptyText + '</div>';
    return;
  }

  const sorted = [...tab.items].sort((a,b) => (a.done === b.done) ? 0 : (a.done ? 1 : -1));
  sorted.forEach(item => {
    const row = document.createElement('div');
    row.className = 'list-item' + (item.done ? ' done' : '');

    const box = document.createElement('div');
    box.className = 'checkbox' + (item.done ? ' checked' : '');
    box.textContent = item.done ? '✓' : '';
    box.addEventListener('click', () => toggleItem(item.id));

    const text = document.createElement('div');
    text.className = 'item-text';
    text.textContent = item.text;

    const del = document.createElement('div');
    del.className = 'delete-btn';
    del.textContent = '✕';
    del.addEventListener('click', () => deleteItem(item.id));

    row.appendChild(box);
    row.appendChild(text);
    row.appendChild(del);
    container.appendChild(row);
  });
}

function updateStatus(text){
  document.getElementById('statusRow').textContent = text;
}

async function fetchList(){
  const tab = currentTab();
  try{
    const res = await fetch(tab.endpoint, { cache: 'no-store' });
    if(!res.ok) throw new Error('fetch failed: ' + res.status);
    const data = await res.json();
    tab.items = Array.isArray(data.items) ? data.items : [];
    saveCache(tab);
    if(tab === currentTab()) render();
    updateStatus('Synced just now');
  } catch(err){
    console.error(err);
    updateStatus('Offline — showing last saved list');
  }
}

async function pushList(){
  const tab = currentTab();
  saveCache(tab);
  try{
    await fetch(tab.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: tab.items }),
    });
    updateStatus('Synced just now');
  } catch(err){
    console.error(err);
    updateStatus('Saved on this phone — will sync when back online');
  }
}

function addItem(text){
  const trimmed = text.trim();
  if(!trimmed) return;
  currentTab().items.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2,7), text: trimmed, done: false });
  render();
  pushList();
}

function toggleItem(id){
  const item = currentTab().items.find(i => i.id === id);
  if(item){ item.done = !item.done; render(); pushList(); }
}

function deleteItem(id){
  const tab = currentTab();
  tab.items = tab.items.filter(i => i.id !== id);
  render();
  pushList();
}

document.getElementById('tabShopping').addEventListener('click', () => switchTab('shopping'));
document.getElementById('tabTodo').addEventListener('click', () => switchTab('todo'));

document.getElementById('addBtn').addEventListener('click', () => {
  const input = document.getElementById('itemInput');
  addItem(input.value);
  input.value = '';
  input.focus();
});
document.getElementById('itemInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    addItem(e.target.value);
    e.target.value = '';
  }
});

// Refresh from the server periodically, and whenever the page becomes visible
// again (e.g. switching back to this tab/app on the phone). Only the active
// tab's list is fetched at any given moment.
renderTabs();
render();
fetchList();
setInterval(fetchList, 15 * 1000);
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible') fetchList();
});
</script>

</body>
</html>
