<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Family Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAF8F5;
    --panel: #FFFFFF;
    --line: #ECE7DF;
    --ink: #2E2B27;
    --ink-dim: #B5AFA6;
    --ink-mid: #8B857C;
    --today-red: #E8604C;

    --c-dad: #F6A9A0;
    --c-dad-ink: #9C3F35;
    --c-mum: #7FCFC1;
    --c-mum-ink: #1F6E60;
    --c-kids: #B7A4E3;
    --c-kids-ink: #5B3F94;
    --c-sophie: #8FC1E8;
    --c-sophie-ink: #24587F;
    --c-shared: #F6C77C;
    --c-shared-ink: #8A5A12;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{
    width:100%; height:100%;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    overflow:hidden;
    -webkit-user-select:none;
    user-select:none;
  }

  .app{ display:flex; width:100vw; height:100vh; }

  /* ---------- icon rail ---------- */
  .rail{
    width:56px;
    background:var(--panel);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px 0;
    gap:6px;
    flex-shrink:0;
  }
  .rail-btn{
    width:36px; height:36px;
    border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color:var(--ink-mid);
  }
  .rail-btn svg{ width:18px; height:18px; }
  .rail-btn.active{ background:#2E2B27; color:#fff; }
  .rail-spacer{ flex:1; }

  /* ---------- main column ---------- */
  .main{ flex:1; display:flex; flex-direction:column; min-width:0; padding:18px 24px 14px; }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-bottom:14px;
  }
  .brand{ display:flex; align-items:baseline; gap:10px; }
  .brand-name{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:26px;
  }
  .brand-clock{
    font-family:'IBM Plex Mono', monospace;
    font-size:15px;
    color:var(--ink-mid);
  }
  .brand-weather{
    font-size:14px;
    color:var(--ink-mid);
    display:flex; align-items:center; gap:5px;
    cursor:pointer;
    padding:4px 10px;
    border-radius:8px;
  }
  .brand-weather:active{ background:var(--line); }
  .topbar-right{ display:flex; align-items:center; gap:18px; }

  .view-toggle{
    display:flex;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:3px;
    gap:2px;
  }
  .view-toggle button{
    font-family:'Inter', sans-serif;
    font-size:13px;
    font-weight:600;
    border:none;
    background:transparent;
    color:var(--ink-mid);
    padding:6px 14px;
    border-radius:8px;
    cursor:pointer;
  }
  .view-toggle button.active{
    background:var(--ink);
    color:#fff;
  }

  /* ---------- people row ---------- */
  .people-row{
    display:flex;
    gap:22px;
    padding:2px 2px 14px;
    border-bottom:1px solid var(--line);
    margin-bottom:12px;
  }
  .person{ display:flex; align-items:center; gap:9px; }
  .avatar{
    width:30px; height:30px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:12px;
    color:#fff;
    flex-shrink:0;
  }
  .person-info{ display:flex; flex-direction:column; gap:4px; min-width:90px; }
  .person-name{ font-size:12.5px; font-weight:600; }
  .person-bar-track{
    width:90px; height:5px; border-radius:3px; background:var(--line); overflow:hidden;
  }
  .person-bar-fill{ height:100%; border-radius:3px; }
  .person-count{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:var(--ink-mid); }

  /* ---------- shared view container ---------- */
  .view{ flex:1; min-height:0; display:flex; flex-direction:column; }
  .view[hidden]{ display:none; }

  /* ================= WEEK VIEW ================= */
  .week-header{
    display:grid;
    grid-template-columns: 52px repeat(7, 1fr);
    padding-bottom:8px;
  }
  .week-header .corner{}
  .week-header .day-head{
    text-align:center;
    padding:4px 0 8px;
  }
  .day-head .dname{
    font-size:11.5px;
    letter-spacing:1px;
    color:var(--ink-mid);
    font-weight:600;
  }
  .day-head .dnum{
    font-family:'Quicksand', sans-serif;
    font-size:16px;
    font-weight:700;
    margin-top:2px;
    display:inline-flex;
    align-items:center; justify-content:center;
    width:26px; height:26px;
    border-radius:50%;
  }
  .day-head.today .dnum{ background:var(--today-red); color:#fff; }

  .week-scroll{
    flex:1;
    overflow-y:auto;
    min-height:0;
    -webkit-overflow-scrolling:touch;
  }
  .week-scroll::-webkit-scrollbar{ width:5px; }
  .week-scroll::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }

  .week-body{
    display:grid;
    grid-template-columns: 52px repeat(7, 1fr);
    position:relative;
  }

  .hour-col{
    display:flex;
    flex-direction:column;
  }
  .hour-label{
    height: var(--row-h);
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    color:var(--ink-mid);
    text-align:right;
    padding-right:8px;
    transform: translateY(-6px);
    flex-shrink:0;
  }

  .day-col{
    position:relative;
    border-left:1px solid var(--line);
    background-image: repeating-linear-gradient(
      to bottom,
      transparent, transparent calc(var(--row-h) - 1px),
      var(--line) calc(var(--row-h) - 1px), var(--line) var(--row-h)
    );
  }
  .day-col.today-col{ background-color: #FFF7F0; }

  .event-block{
    position:absolute;
    border-radius:9px;
    padding:6px 8px 5px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    gap:1px;
  }
  .event-block .etitle{
    font-size:11.5px;
    font-weight:700;
    line-height:1.2;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .event-block .etime{
    font-family:'IBM Plex Mono', monospace;
    font-size:9.5px;
    opacity:0.85;
    white-space:nowrap;
  }
  .event-block .edot{
    position:absolute;
    bottom:6px; right:7px;
    width:14px; height:14px;
    border-radius:50%;
  }

  /* ================= MONTH VIEW ================= */
  .month-nav{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    padding-bottom:10px;
  }
  .month-nav-label{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:18px;
    min-width:150px;
    text-align:center;
  }
  .month-nav-btn{
    width:32px; height:32px;
    border-radius:9px;
    border:1px solid var(--line);
    background:var(--panel);
    font-size:18px;
    line-height:1;
    color:var(--ink);
    cursor:pointer;
  }
  .month-nav-btn:active{ background:var(--line); }

  .month-weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    padding-bottom:6px;
  }
  .month-weekdays div{
    text-align:center;
    font-size:11.5px;
    font-weight:600;
    color:var(--ink-mid);
    letter-spacing:1px;
  }
  .month-scroll{
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  .month-grid{
    flex:1;
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
    min-height:0;
  }
  .mcell{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:6px 7px;
    display:flex;
    flex-direction:column;
    min-height:0;
    overflow:hidden;
  }
  .mcell.outside{ opacity:0.35; }
  .mcell .mdate{
    font-family:'Quicksand', sans-serif;
    font-size:13px;
    font-weight:700;
    color:var(--ink-mid);
    margin-bottom:3px;
  }
  .mcell.today .mdate{
    display:inline-flex; align-items:center; justify-content:center;
    width:22px; height:22px; border-radius:50%;
    background:var(--today-red); color:#fff;
  }
  .mevents{ display:flex; flex-direction:column; gap:3px; overflow-y:auto; flex:1; min-height:0; -webkit-overflow-scrolling:touch; scrollbar-width:thin; }
  .mevents::-webkit-scrollbar{ width:4px; }
  .mevents::-webkit-scrollbar-thumb{ background:var(--line); border-radius:2px; }
  .mevents::-webkit-scrollbar-track{ background:transparent; }
  .mevent{
    font-size:10.5px;
    font-weight:600;
    border-radius:5px;
    padding:2px 6px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .mmore{ font-family:'IBM Plex Mono', monospace; font-size:9.5px; color:var(--ink-mid); padding-left:4px; cursor:pointer; }

  /* ---------- shopping list view ---------- */
  .list-header{
    display:flex;
    gap:10px;
    padding-bottom:14px;
  }
  .list-header input{
    flex:1;
    padding:12px 16px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--panel);
    font-family:'Inter', sans-serif;
    font-size:15px;
    color:var(--ink);
    -webkit-user-select:text;
    user-select:text;
  }
  .list-header input:focus{ outline:2px solid var(--c-mum); outline-offset:1px; }
  .list-header button{
    padding:0 22px;
    border-radius:12px;
    border:none;
    background:var(--ink);
    color:#fff;
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
  }
  .list-header button:active{ opacity:0.85; }

  .list-items{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .list-items::-webkit-scrollbar{ width:5px; }
  .list-items::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }

  .list-item{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:8px;
  }
  .list-item.done{ background:#FAF9F7; }

  .list-checkbox{
    width:26px; height:26px;
    border-radius:50%;
    border:2px solid var(--ink-mid);
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color:#fff;
    font-size:14px;
    font-weight:700;
  }
  .list-checkbox.checked{
    background:var(--c-mum);
    border-color:var(--c-mum);
  }

  .list-text{
    flex:1;
    font-size:16px;
    color:var(--ink);
  }
  .list-item.done .list-text{
    text-decoration:line-through;
    color:var(--ink-mid);
  }

  .list-delete{
    color:var(--ink-mid);
    font-size:18px;
    padding:4px 8px;
    cursor:pointer;
    flex-shrink:0;
  }

  .list-empty{
    text-align:center;
    color:var(--ink-mid);
    font-size:14px;
    padding:40px 0;
  }

  /* ---------- chores view ---------- */
  .chores-grid{
    flex:1;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
    min-height:0;
  }
  .chore-card{
    display:flex;
    flex-direction:column;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    min-height:0;
  }
  .chore-card-header{
    padding:14px 18px;
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:18px;
    color:#fff;
  }
  .chore-input-row{
    display:flex;
    gap:8px;
    padding:12px 14px;
    border-bottom:1px solid var(--line);
  }
  .chore-input{
    flex:1;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    font-family:'Inter', sans-serif;
    font-size:14px;
    color:var(--ink);
    -webkit-user-select:text;
    user-select:text;
  }
  .chore-add-btn{
    padding:0 16px;
    border-radius:10px;
    border:none;
    background:var(--ink);
    color:#fff;
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
  }
  .chore-add-btn:active{ opacity:0.85; }

  .chore-items{
    flex:1;
    overflow-y:auto;
    padding:12px 14px;
    -webkit-overflow-scrolling:touch;
  }
  .chore-items::-webkit-scrollbar{ width:5px; }
  .chore-items::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }

  .chore-item{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:7px;
  }
  .chore-item.done{ background:#FAF9F7; }

  .chore-checkbox{
    width:22px; height:22px;
    border-radius:50%;
    border:2px solid var(--ink-mid);
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color:#fff;
    font-size:12px;
    font-weight:700;
  }

  .chore-text{ flex:1; font-size:14px; color:var(--ink); }
  .chore-item.done .chore-text{ text-decoration:line-through; color:var(--ink-mid); }

  .chore-delete{
    color:var(--ink-mid);
    font-size:16px;
    padding:2px 6px;
    cursor:pointer;
    flex-shrink:0;
  }

  .chore-empty{
    text-align:center;
    color:var(--ink-mid);
    font-size:13px;
    padding:30px 0;
  }

  .event-block, .mevent{ cursor:pointer; }

  /* ---------- tap-to-expand popup ---------- */
  .popup-backdrop{
    position:fixed; inset:0;
    background:rgba(46,43,39,0.35);
    display:flex; align-items:center; justify-content:center;
    z-index:50;
    opacity:0; pointer-events:none;
    transition:opacity 0.15s ease;
  }
  .popup-backdrop.open{ opacity:1; pointer-events:auto; }

  .popup-card{
    background:#fff;
    border-radius:16px;
    min-width:280px;
    max-width:420px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    overflow:hidden;
    transform:scale(0.96);
    transition:transform 0.15s ease;
  }
  .popup-backdrop.open .popup-card{ transform:scale(1); }

  .popup-bar{ height:8px; width:100%; }
  .popup-body{ padding:20px 22px 18px; }
  .popup-title{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:20px;
    margin-bottom:8px;
    line-height:1.25;
  }
  .popup-meta{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
    color:var(--ink-mid);
  }
  .popup-meta .pdot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .popup-list-item{
    display:flex; align-items:center; gap:10px;
    padding:9px 0;
    border-bottom:1px solid var(--line);
  }
  .popup-list-item:last-child{ border-bottom:none; }
  .popup-list-item .pdot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .popup-list-item .ptitle{ font-weight:600; font-size:14px; flex:1; }
  .popup-list-item .ptime{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--ink-mid); }
  .popup-hint{
    text-align:center;
    font-size:11.5px;
    color:var(--ink-mid);
    padding:10px 0 4px;
  }

  .popup-card.wide{ max-width:640px; }
  .forecast-row{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding-bottom:4px;
  }
  .forecast-day{
    flex:1;
    min-width:56px;
    text-align:center;
    background:var(--bg);
    border-radius:10px;
    padding:10px 4px 9px;
  }
  .forecast-day.today{ background:#FFF1E6; }
  .forecast-day .fname{ font-size:11px; font-weight:700; color:var(--ink-mid); margin-bottom:4px; }
  .forecast-day .ficon{ font-size:22px; margin-bottom:4px; }
  .forecast-day .fhigh{ font-size:13px; font-weight:700; }
  .forecast-day .flow{ font-size:11.5px; color:var(--ink-mid); }
</style>
</head>
<body>

<div class="app">
  <aside class="rail">
    <div class="rail-btn" id="btnToday" title="Jump to today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"/></svg>
    </div>
    <div class="rail-btn active" id="railWeek" title="Week view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18"/><path d="M8 4v-1M16 4v-1"/></svg>
    </div>
    <div class="rail-btn" id="railMonth" title="Month view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 10h18"/><path d="M9 14h.01M13 14h.01M17 14h.01M9 17h.01M13 17h.01"/></svg>
    </div>
    <div class="rail-btn" id="railList" title="Shopping list">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3h11l3 3v15a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"/><path d="M16 3v3a1 1 0 0 0 1 1h3"/><path d="M8 11h8M8 15h8M8 19h5"/></svg>
    </div>
    <div class="rail-btn" id="railChores" title="Chores">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 3h6v2a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1V3Z"/><path d="m8.5 12 1.5 1.5L13 10.5"/><path d="m8.5 17 1.5 1.5L13 15.5"/></svg>
    </div>
    <div class="rail-spacer"></div>
    <div class="rail-btn" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="brand">
        <div class="brand-name">Spence Family</div>
        <div class="brand-clock" id="clock">--:--</div>
        <div class="brand-weather" id="weatherBtn">
          <span id="weatherIcon">⛅</span><span id="weatherTemp">--°</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="view-toggle" id="viewToggle">
          <button id="toggleWeek" class="active">Week</button>
          <button id="toggleMonth">Month</button>
          <button id="toggleList">List</button>
          <button id="toggleChores">Chores</button>
        </div>
      </div>
    </div>

    <div class="people-row" id="peopleRow"></div>

    <div class="view" id="weekView">
      <div class="week-header" id="weekHeader"></div>
      <div class="week-scroll" id="weekScroll">
        <div class="week-body" id="weekBody"></div>
      </div>
    </div>

    <div class="view" id="monthView" hidden>
      <div class="month-nav">
        <button class="month-nav-btn" id="monthPrev" aria-label="Previous month">‹</button>
        <div class="month-nav-label" id="monthNavLabel">Month Year</div>
        <button class="month-nav-btn" id="monthNext" aria-label="Next month">›</button>
      </div>
      <div class="month-weekdays">
        <div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div><div>SUN</div>
      </div>

<script>
const PEOPLE = {
  dad:    { name:'Jonny',    color:'var(--c-dad)',    ink:'var(--c-dad-ink)',    initial:'J' },
  mum:    { name:'Catherine',color:'var(--c-mum)',    ink:'var(--c-mum-ink)',    initial:'C' },
  shared: { name:'Shared',   color:'var(--c-shared)', ink:'var(--c-shared-ink)', initial:'S' },
};

// URL of the Cloudflare Worker that merges the Google Calendar feeds.
// Leave blank to keep showing demo/placeholder events.
const CALENDAR_FEED_URL = 'https://family-calendar.jonathanspencedesign.workers.dev/';

// Set to the tablet's actual location. Defaults to Newtownabbey.
const LOCATION = { name:'Newtownabbey', lat:54.6779, lon:-5.9249 };

const WEATHER_ICONS = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌦️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'🌨️', 75:'🌨️',
  80:'🌦️', 81:'🌧️', 82:'⛈️',
  95:'⛈️', 96:'⛈️', 99:'⛈️',
};
function weatherIcon(code){ return WEATHER_ICONS[code] || '🌡️'; }

const HOUR_START = 0;
const HOUR_END = 24;
const HOURS = HOUR_END - HOUR_START;
const ROW_HEIGHT = 64; // px per hour in the week view — taller rows, day is scrollable
const DEFAULT_SCROLL_HOUR = 7; // where the week view opens by default (still scrollable to see all 24h)

// ---------- seeded rng so layout is stable across renders ----------
let seed = 11;
function rand(){ seed = (seed*9301+49297)%233280; return seed/233280; }

let LIVE_EVENTS = null; // populated once the Worker feed loads successfully

async function loadCalendarData(){
  if(!CALENDAR_FEED_URL) return; // no feed configured yet — stay in demo mode
  try{
    const res = await fetch(CALENDAR_FEED_URL);
    if(!res.ok) throw new Error('feed returned ' + res.status);
    const data = await res.json();
    LIVE_EVENTS = data.events.map(e => ({
      person: e.person,
      title: e.title,
      start: new Date(e.start),
      end: new Date(e.end),
      allDay: !!e.allDay
    }));
  } catch(err){
    console.error('Calendar feed error:', err);
    // keep showing whatever we last had (or demo mode if this was the first load)
  }
}

function dateKey(y,m,d){ return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }

function eventsOnDate(y, m, d){
  if(!LIVE_EVENTS) return null;
  const dayStart = Date.UTC(y, m, d);
  const dayEnd = dayStart + 86400000; // exclusive, per iCal DTEND convention
  return LIVE_EVENTS.filter(ev => ev.start.getTime() < dayEnd && ev.end.getTime() > dayStart);
}

function clampHour(h, minVal){
  let v = Math.max(HOUR_START, Math.min(HOUR_END, h));
  if(minVal !== undefined) v = Math.max(v, minVal);
  return v;
}

function buildWeekEvents(weekDates){
  if(LIVE_EVENTS){
    return weekDates.map(d => {
      const y = d.getFullYear(), m = d.getMonth(), dayNum = d.getDate();
      const list = eventsOnDate(y, m, dayNum) || [];
      const dayStart = Date.UTC(y, m, dayNum);
      const dayEnd = dayStart + 86400000;
      return list.map(ev => {
        if(ev.allDay){
          return { person: ev.person, title: ev.title, start: HOUR_START, end: HOUR_START + 0.75 };
        }
        // Clip the event to this specific day's 0–24h window, so a multi-day
        // event shows a continuing block on every day it spans, not just the first.
        const clippedStartMs = Math.max(ev.start.getTime(), dayStart);
        const clippedEndMs = Math.min(ev.end.getTime(), dayEnd);
        const start = clampHour((clippedStartMs - dayStart) / 3600000);
        const end = clampHour((clippedEndMs - dayStart) / 3600000, start + 0.5);
        return { person: ev.person, title: ev.title, start, end };
      });
    });
  }
  return buildWeekEventsMock(weekDates);
}

function buildWeekEventsMock(weekDates){
  const titles = [
    ['dad','Site visit — Belfast'], ['mum','School run'], ['shared','Family dinner'],
    ['dad','Client call'], ['mum','Physio'], ['shared','Bins out'], ['dad','Table tennis'],
    ['mum','Coffee w/ Claire'], ['shared','Grandma visiting'],
    ['dad','Gym — legs day'], ['mum','Book club'], ['shared','Half term starts'],
  ];
  const days = [];
  const DEMO_START = 8, DEMO_END = 20;
  for(let d=0; d<7; d++){
    const count = rand() < 0.1 ? 0 : (rand() < 0.5 ? 1 : (rand() < 0.85 ? 2 : 3));
    const evs = [];
    let cursor = DEMO_START + rand()*2;
    for(let i=0;i<count;i++){
      const [person, title] = titles[Math.floor(rand()*titles.length)];
      const dur = 0.75 + rand()*1.5;
      const start = Math.min(cursor, DEMO_END-1);
      const end = Math.min(start+dur, DEMO_END);
      evs.push({ person, title, start, end });
      cursor = end + 0.5 + rand()*1.5;
    }
    days.push(evs);
  }
  return days;
}

function layoutOverlaps(events){
  const sorted = [...events].sort((a,b)=>a.start-b.start);
  const cols = [];
  sorted.forEach(ev => {
    let placed = false;
    for(const col of cols){
      if(col[col.length-1].end <= ev.start){ col.push(ev); ev._col = cols.indexOf(col); placed = true; break; }
    }
    if(!placed){ cols.push([ev]); ev._col = cols.length-1; }
  });
  sorted.forEach(ev => { ev._cols = cols.length; });
  return sorted;
}

function fmtTime(h){
  const hour = Math.floor(h);
  const min = Math.round((h-hour)*60);
  const period = hour >= 12 ? 'pm' : 'am';
  const h12 = ((hour+11)%12)+1;
  return h12 + (min ? ':' + String(min).padStart(2,'0') : '') + period;
}

function getMonday(d){
  const date = new Date(d);
  const day = (date.getDay()+6)%7;
  date.setDate(date.getDate()-day);
  date.setHours(0,0,0,0);
  return date;
}

let currentView = 'week';
let weekEventsFlat = [];
let monthEventsFlat = [];

function renderPeopleRow(flatEvents){
  const counts = {};
  Object.keys(PEOPLE).forEach(k => counts[k] = 0);
  flatEvents.forEach(ev => { if(counts[ev.person] !== undefined) counts[ev.person]++; });
  const total = Math.max(1, Math.max(...Object.values(counts)));
  const row = document.getElementById('peopleRow');
  row.innerHTML = '';
  Object.entries(PEOPLE).forEach(([key,p]) => {
    const c = counts[key];
    const el = document.createElement('div');
    el.className = 'person';
    el.innerHTML =
      '<div class="avatar" style="background:'+p.color+'">'+p.initial+'</div>'+
      '<div class="person-info">'+
        '<div class="person-name">'+p.name+'</div>'+
        '<div class="person-bar-track"><div class="person-bar-fill" style="width:'+(c/total*100)+'%;background:'+p.color+'"></div></div>'+
      '</div>'+
      '<div class="person-count">'+c+'</div>';
    row.appendChild(el);
  });
}

function updatePeopleRow(){
  renderPeopleRow(currentView === 'month' ? monthEventsFlat : weekEventsFlat);
}

function renderWeek(){
  const monday = getMonday(new Date());
  const weekDates = [...Array(7)].map((_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
  const todayStr = new Date().toDateString();

  const events = buildWeekEvents(weekDates);
  weekEventsFlat = events.flat();
  updatePeopleRow();

  // header
  const header = document.getElementById('weekHeader');
  header.innerHTML = '<div class="corner"></div>';
  weekDates.forEach(d => {
    const isToday = d.toDateString() === todayStr;
    const head = document.createElement('div');
    head.className = 'day-head' + (isToday ? ' today' : '');
    head.innerHTML =
      '<div class="dname">'+d.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase()+'</div>'+
      '<div class="dnum">'+d.getDate()+'</div>';
    header.appendChild(head);
  });

  // body
  const body = document.getElementById('weekBody');
  const scrollWrap = document.getElementById('weekScroll');
  body.innerHTML = '';
  body.style.setProperty('--row-h', ROW_HEIGHT + 'px');

  const totalHeight = HOURS * ROW_HEIGHT;

  const hourCol = document.createElement('div');
  hourCol.className = 'hour-col';
  for(let h=HOUR_START; h<HOUR_END; h++){
    const lbl = document.createElement('div');
    lbl.className = 'hour-label';
    lbl.textContent = fmtTime(h);
    hourCol.appendChild(lbl);
  }
  body.appendChild(hourCol);

  weekDates.forEach((d,i) => {
    const isToday = d.toDateString() === todayStr;
    const col = document.createElement('div');
    col.className = 'day-col' + (isToday ? ' today-col' : '');
    col.style.height = totalHeight + 'px';

    const laidOut = layoutOverlaps(events[i]);
    laidOut.forEach(ev => {
      const top = (ev.start - HOUR_START) * ROW_HEIGHT;
      const height = (ev.end - ev.start) * ROW_HEIGHT;
      const width = 100 / ev._cols;
      const left = ev._col * width;
      const p = PEOPLE[ev.person];
      const block = document.createElement('div');
      block.className = 'event-block';
      block.style.top = top + 'px';
      block.style.height = Math.max(height - 3, 16) + 'px';
      block.style.left = 'calc(' + left + '% + 2px)';
      block.style.width = 'calc(' + width + '% - 5px)';
      block.style.background = p.color;
      block.style.color = p.ink;
      block.innerHTML =
        '<div class="etitle">'+ev.title+'</div>'+
        '<div class="etime">'+fmtTime(ev.start)+' – '+fmtTime(ev.end)+'</div>';
      block.addEventListener('click', (e) => { e.stopPropagation(); showSingleEvent(ev); });
      col.appendChild(block);
    });
    body.appendChild(col);
  });

  // Open the view scrolled to a sensible default (e.g. 7am) rather than midnight,
  // but the whole 24h day remains reachable by scrolling up/down.
  if(scrollWrap.dataset.scrolled !== 'true'){
    scrollWrap.scrollTop = DEFAULT_SCROLL_HOUR * ROW_HEIGHT;
    scrollWrap.dataset.scrolled = 'true';
  }
}

function buildMonthEvents(daysInMonth, year, month){
  if(LIVE_EVENTS){
    const events = {};
    for(let d=1; d<=daysInMonth; d++){
      const list = eventsOnDate(year, month, d);
      if(list && list.length){
        events[d] = list.map(ev => ({
          person: ev.person,
          title: ev.title,
          timeLabel: ev.allDay ? 'All day' :
            (fmtTime(ev.start.getUTCHours() + ev.start.getUTCMinutes()/60) + ' – ' +
             fmtTime(ev.end.getUTCHours() + ev.end.getUTCMinutes()/60))
        }));
      }
    }
    return events;
  }
  return buildMonthEventsMock(daysInMonth);
}

function buildMonthEventsMock(daysInMonth){
  const pool = [
    ['dad','Site visit','09:00 – 10:30'], ['mum','School run','08:30 – 8:45am'],
    ['shared','Family dinner','18:30 – 19:30'], ['dad','Client call','13:00 – 13:30'],
    ['mum','Physio','11:00 – 11:45'], ['shared','Bins out','20:00'],
    ['dad','Table tennis','20:00 – 21:30'], ['mum','Coffee w/ Claire','10:00 – 11:00'],
    ['shared','Grandma visiting','12:00 – 14:00'],
  ];
  const events = {};
  for(let d=1; d<=daysInMonth; d++){
    const count = rand() < 0.2 ? 0 : (rand() < 0.45 ? 1 : (rand() < 0.7 ? 2 : (rand() < 0.9 ? 3 : (rand() < 0.97 ? 4 : 5))));
    const items = [];
    for(let i=0;i<count;i++){
      const [person, title, timeLabel] = pool[Math.floor(rand()*pool.length)];
      items.push({ person, title, timeLabel });
    }
    if(items.length) events[d] = items;
  }
  return events;
}

let monthOffset = 0; // 0 = current month, +1 = next month, -1 = previous, etc.

function renderMonth(){
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
  const year = target.getFullYear(), month = target.getMonth();
  const isCurrentMonth = (now.getFullYear() === year && now.getMonth() === month);
  const today = now.getDate();

  document.getElementById('monthNavLabel').textContent =
    target.toLocaleDateString('en-GB', { month:'long', year:'numeric' });

  const firstOfMonth = new Date(year, month, 1);
  const startOffset = (firstOfMonth.getDay()+6)%7;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const totalCells = Math.ceil((startOffset+daysInMonth)/7)*7;
  const events = buildMonthEvents(daysInMonth, year, month);
  monthEventsFlat = Object.values(events).flat();
  updatePeopleRow();

  const grid = document.getElementById('monthGrid');
  grid.innerHTML = '';
  for(let i=0;i<totalCells;i++){
    let dayNum, outside=false, isToday=false;
    if(i<startOffset){ dayNum = daysInPrevMonth-startOffset+i+1; outside=true; }
    else if(i>=startOffset+daysInMonth){ dayNum = i-startOffset-daysInMonth+1; outside=true; }
    else { dayNum = i-startOffset+1; isToday = isCurrentMonth && dayNum===today; }

    const cell = document.createElement('div');
    cell.className = 'mcell'+(outside?' outside':'')+(isToday?' today':'');
    cell.innerHTML = '<div class="mdate">'+dayNum+'</div>';

    if(!outside && events[dayNum]){
      const wrap = document.createElement('div');
      wrap.className = 'mevents';
      const list = events[dayNum];
      const dayLabel = new Date(year, month, dayNum).toLocaleDateString('en-GB',{weekday:'long', day:'numeric', month:'long'});
      list.forEach(item => {
        const p = PEOPLE[item.person];
        const row = document.createElement('div');
        row.className = 'mevent';
        row.style.background = p.color;
        row.style.color = p.ink;
        row.textContent = item.title;
        row.addEventListener('click', (e) => {
          e.stopPropagation();
          showSingleEvent({ person: item.person, title: item.title, time: item.timeLabel || '' });
        });
        wrap.appendChild(row);
      });
      cell.appendChild(wrap);
    }
    grid.appendChild(cell);
  }
}

// ---------- tap-to-expand popup ----------
const popupBackdrop = document.getElementById('popupBackdrop');
const popupCard = document.getElementById('popupCard');
let popupTimer = null;

function showPopup(html, barColor){
  popupCard.classList.remove('wide');
  popupCard.innerHTML =
    '<div class="popup-bar" style="background:'+(barColor||'#ddd')+'"></div>'+
    '<div class="popup-body">'+html+'</div>';
  popupBackdrop.classList.add('open');
  clearTimeout(popupTimer);
  popupTimer = setTimeout(hidePopup, 8000);
}

function hidePopup(){
  popupBackdrop.classList.remove('open');
  clearTimeout(popupTimer);
}

popupBackdrop.addEventListener('click', (e) => {
  if(e.target === popupBackdrop) hidePopup();
});
popupCard.addEventListener('click', hidePopup);

function showSingleEvent(ev){
  const p = PEOPLE[ev.person];
  const timeStr = (ev.start !== undefined) ? fmtTime(ev.start)+' – '+fmtTime(ev.end) : ev.time;
  const metaLine = timeStr ? (p.name+' &nbsp;·&nbsp; '+timeStr) : p.name;
  showPopup(
    '<div class="popup-title">'+ev.title+'</div>'+
    '<div class="popup-meta"><span class="pdot" style="background:'+p.color+'"></span>'+metaLine+'</div>'+
    '<div class="popup-hint">Tap anywhere to close</div>',
    p.color
  );
}

function showDayList(dayLabel, list){
  const items = list.map(([person,title]) => {
    const p = PEOPLE[person];
    return '<div class="popup-list-item"><span class="pdot" style="background:'+p.color+'"></span>'+
           '<span class="ptitle">'+title+'</span><span class="ptime">'+p.name+'</span></div>';
  }).join('');
  showPopup(
    '<div class="popup-title">'+dayLabel+'</div>'+items+
    '<div class="popup-hint">Tap anywhere to close</div>',
    '#ddd'
  );
}

// ---------- weather ----------
let forecastCache = null;

async function fetchWeather(){
  const url = 'https://api.open-meteo.com/v1/forecast?latitude='+LOCATION.lat+'&longitude='+LOCATION.lon+
    '&daily=weathercode,temperature_2m_max,temperature_2m_min&current_weather=true&timezone=auto&forecast_days=10';
  const res = await fetch(url);
  if(!res.ok) throw new Error('weather fetch failed');
  return res.json();
}

async function loadWeather(){
  try{
    const data = await fetchWeather();
    forecastCache = data;
    document.getElementById('weatherIcon').textContent = weatherIcon(data.current_weather.weathercode);
    document.getElementById('weatherTemp').textContent = Math.round(data.current_weather.temperature) + '°';
  } catch(e){
    document.getElementById('weatherIcon').textContent = '⛅';
    document.getElementById('weatherTemp').textContent = '--°';
  }
}

function showForecast(){
  if(!forecastCache){
    showPopup('<div class="popup-title">Weather unavailable</div><div class="popup-meta">Check the tablet\'s internet connection.</div><div class="popup-hint">Tap anywhere to close</div>');
    return;
  }
  const days = forecastCache.daily.time;
  const todayStr = new Date().toDateString();
  const cards = days.map((dateStr,i) => {
    const d = new Date(dateStr);
    const isToday = d.toDateString() === todayStr;
    const label = isToday ? 'Today' : d.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase();
    const hi = Math.round(forecastCache.daily.temperature_2m_max[i]);
    const lo = Math.round(forecastCache.daily.temperature_2m_min[i]);
    return '<div class="forecast-day'+(isToday?' today':'')+'">'+
      '<div class="fname">'+label+'</div>'+
      '<div class="ficon">'+weatherIcon(forecastCache.daily.weathercode[i])+'</div>'+
      '<div class="fhigh">'+hi+'°</div>'+
      '<div class="flow">'+lo+'°</div>'+
    '</div>';
  }).join('');
  popupCard.classList.add('wide');
  showPopup(
    '<div class="popup-title">'+LOCATION.name+' — 10 day forecast</div>'+
    '<div class="forecast-row">'+cards+'</div>'+
    '<div class="popup-hint">Tap anywhere to close</div>'
  );
}

document.getElementById('weatherBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  showForecast();
});

loadWeather();
setInterval(loadWeather, 30 * 60 * 1000);

function setView(view){
  currentView = view;
  document.getElementById('weekView').hidden = view !== 'week';
  document.getElementById('monthView').hidden = view !== 'month';
  document.getElementById('listView').hidden = view !== 'list';
  document.getElementById('choresView').hidden = view !== 'chores';
  document.getElementById('toggleWeek').classList.toggle('active', view==='week');
  document.getElementById('toggleMonth').classList.toggle('active', view==='month');
  document.getElementById('toggleList').classList.toggle('active', view==='list');
  document.getElementById('toggleChores').classList.toggle('active', view==='chores');
  document.getElementById('railWeek').classList.toggle('active', view==='week');
  document.getElementById('railMonth').classList.toggle('active', view==='month');
  document.getElementById('railList').classList.toggle('active', view==='list');
  document.getElementById('railChores').classList.toggle('active', view==='chores');
  document.getElementById('peopleRow').style.display = (view==='list' || view==='chores') ? 'none' : 'flex';
  if(view === 'list') renderShoppingList();
  if(view === 'chores') renderChores();
  updatePeopleRow();
}

document.getElementById('toggleWeek').onclick = ()=>setView('week');
document.getElementById('toggleMonth').onclick = ()=>setView('month');
document.getElementById('toggleList').onclick = ()=>setView('list');
document.getElementById('toggleChores').onclick = ()=>setView('chores');
document.getElementById('railWeek').onclick = ()=>setView('week');
document.getElementById('railMonth').onclick = ()=>setView('month');
document.getElementById('railList').onclick = ()=>setView('list');
document.getElementById('railChores').onclick = ()=>setView('chores');
document.getElementById('monthPrev').onclick = ()=>{ monthOffset--; renderMonth(); };
document.getElementById('monthNext').onclick = ()=>{ monthOffset++; renderMonth(); };

// ---------- shopping list ----------
// Persisted with localStorage — this is a real page (GitHub Pages / the tablet's
// browser), not a sandboxed preview, so localStorage works normally here and
// keeps the list intact between reloads on this tablet.
const LIST_STORAGE_KEY = 'family-shopping-list-v1';

function loadShoppingList(){
  try{
    const raw = localStorage.getItem(LIST_STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e){
    return [];
  }
}

function saveShoppingList(){
  try{ localStorage.setItem(LIST_STORAGE_KEY, JSON.stringify(shoppingList)); } catch(e){}
}

let shoppingList = loadShoppingList();

function renderShoppingList(){
  const container = document.getElementById('listItems');
  container.innerHTML = '';

  if(shoppingList.length === 0){
    container.innerHTML = '<div class="list-empty">List\'s empty — add something above.</div>';
    return;
  }

  // Unchecked items first, checked ones sink to the bottom.
  const sorted = [...shoppingList].sort((a,b) => (a.done === b.done) ? 0 : (a.done ? 1 : -1));

  sorted.forEach(item => {
    const row = document.createElement('div');
    row.className = 'list-item' + (item.done ? ' done' : '');

    const box = document.createElement('div');
    box.className = 'list-checkbox' + (item.done ? ' checked' : '');
    box.textContent = item.done ? '✓' : '';
    box.addEventListener('click', () => toggleShoppingItem(item.id));

    const text = document.createElement('div');
    text.className = 'list-text';
    text.textContent = item.text;

    const del = document.createElement('div');
    del.className = 'list-delete';
    del.textContent = '✕';
    del.addEventListener('click', () => deleteShoppingItem(item.id));

    row.appendChild(box);
    row.appendChild(text);
    row.appendChild(del);
    container.appendChild(row);
  });
}

function addShoppingItem(text){
  const trimmed = text.trim();
  if(!trimmed) return;
  shoppingList.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2,7), text: trimmed, done: false });
  saveShoppingList();
  renderShoppingList();
}

function toggleShoppingItem(id){
  const item = shoppingList.find(i => i.id === id);
  if(item){ item.done = !item.done; saveShoppingList(); renderShoppingList(); }
}

function deleteShoppingItem(id){
  shoppingList = shoppingList.filter(i => i.id !== id);
  saveShoppingList();
  renderShoppingList();
}

document.getElementById('listAddBtn').addEventListener('click', () => {
  const input = document.getElementById('listInput');
  addShoppingItem(input.value);
  input.value = '';
  input.focus();
});
document.getElementById('listInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    addShoppingItem(e.target.value);
    e.target.value = '';
  }
});

// ---------- chores (Charlotte / Sophie) ----------
const CHORES_STORAGE_KEY = 'family-chores-v1';
const CHORE_COLORS = { charlotte: 'var(--c-kids)', sophie: 'var(--c-sophie)' };

function loadChores(){
  try{
    const raw = localStorage.getItem(CHORES_STORAGE_KEY);
    return raw ? JSON.parse(raw) : { charlotte: [], sophie: [] };
  } catch(e){
    return { charlotte: [], sophie: [] };
  }
}

function saveChores(){
  try{ localStorage.setItem(CHORES_STORAGE_KEY, JSON.stringify(chores)); } catch(e){}
}

let chores = loadChores();

function renderChores(){
  ['charlotte','sophie'].forEach(child => {
    const container = document.querySelector('.chore-items[data-items-for="'+child+'"]');
    container.innerHTML = '';
    const list = chores[child] || [];

    if(list.length === 0){
      container.innerHTML = '<div class="chore-empty">No chores yet.</div>';
      return;
    }

    const sorted = [...list].sort((a,b) => (a.done === b.done) ? 0 : (a.done ? 1 : -1));
    sorted.forEach(item => {
      const row = document.createElement('div');
      row.className = 'chore-item' + (item.done ? ' done' : '');

      const box = document.createElement('div');
      box.className = 'chore-checkbox';
      box.style.background = item.done ? CHORE_COLORS[child] : 'transparent';
      box.style.borderColor = item.done ? CHORE_COLORS[child] : '';
      box.textContent = item.done ? '😊' : '';
      box.addEventListener('click', () => toggleChoreItem(child, item.id));

      const text = document.createElement('div');
      text.className = 'chore-text';
      text.textContent = item.text;

      const del = document.createElement('div');
      del.className = 'chore-delete';
      del.textContent = '✕';
      del.addEventListener('click', () => deleteChoreItem(child, item.id));

      row.appendChild(box);
      row.appendChild(text);
      row.appendChild(del);
      container.appendChild(row);
    });
  });
}

function addChoreItem(child, text){
  const trimmed = text.trim();
  if(!trimmed) return;
  chores[child] = chores[child] || [];
  chores[child].push({ id: Date.now() + '-' + Math.random().toString(36).slice(2,7), text: trimmed, done: false });
  saveChores();
  renderChores();
}

function toggleChoreItem(child, id){
  const item = (chores[child] || []).find(i => i.id === id);
  if(item){ item.done = !item.done; saveChores(); renderChores(); }
}

function deleteChoreItem(child, id){
  chores[child] = (chores[child] || []).filter(i => i.id !== id);
  saveChores();
  renderChores();
}

document.querySelectorAll('.chore-card').forEach(card => {
  const child = card.dataset.child;
  const input = card.querySelector('.chore-input');
  const btn = card.querySelector('.chore-add-btn');
  btn.addEventListener('click', () => {
    addChoreItem(child, input.value);
    input.value = '';
    input.focus();
  });
  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      addChoreItem(child, e.target.value);
      e.target.value = '';
    }
  });
});

// Swipe left/right on the month grid to change months (touch-friendly)
(function(){
  const el = document.getElementById('monthScroll');
  let touchStartX = null, touchStartY = null;
  el.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive:true });
  el.addEventListener('touchend', (e) => {
    if(touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5){
      monthOffset += (dx < 0 ? 1 : -1);
      renderMonth();
    }
    touchStartX = null; touchStartY = null;
  }, { passive:true });
})();
document.getElementById('btnToday').onclick = ()=>{
  const sw = document.getElementById('weekScroll');
  if(sw) sw.dataset.scrolled = 'false';
  monthOffset = 0;
  refreshAll();
};

function tickClock(){
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

async function refreshAll(){
  await loadCalendarData();
  renderWeek();
  renderMonth();
}

refreshAll();
tickClock();
setInterval(tickClock, 1000);
setInterval(refreshAll, 10*60*1000);
</script>
